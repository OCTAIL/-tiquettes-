<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Étiquettes recto + verso</title>
  <style>
    @page { margin: 0; }
    html, body { margin: 0; padding: 0; background: #ccc; }
    /* À l'écran, on affiche les deux étiquettes empilées avec un fond gris */
    iframe {
      display: block;
      border: 0;
      width: 100vw;
      height: 100vh;
      background: #fff;
    }
    /* Page-break entre les deux pour qu'à l'impression elles sortent sur 2 pages */
    .recto-frame { page-break-after: always; break-after: page; }

    @media print {
      html, body { background: #fff !important; }
      iframe { width: 100%; height: 100vh; }
    }
  </style>
</head>
<body>
<iframe class="recto-frame" id="frRecto" title="recto"></iframe>
<iframe class="verso-frame" id="frVerso" title="verso"></iframe>
<script>
  // Transmet tous les paramètres URL (nom, lot, dluo, ingredients, ..., w, h)
  // aux deux étiquettes embarquées.
  var search = window.location.search;
  document.getElementById('frRecto').src = 'etiquette.html' + search;
  document.getElementById('frVerso').src = 'etiquette.verso.html' + search;
</script>
</body>
</html>
