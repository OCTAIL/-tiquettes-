<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Étiquette Recto</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:76mm; height:51mm; }
    body { position:relative; overflow:hidden; }

    .etiquette {
      position:relative;
      width:76mm; height:51mm;
      background:#213b8a;
      overflow:hidden;
    }

    .cadre {
      position:absolute;
      top:1mm; left:1mm; right:1mm; bottom:1mm;
      border:0.4mm solid #c4973a;
      pointer-events:none;
    }

    .header {
      position:absolute;
      top:4mm; left:5mm; right:5mm;
      display:flex; align-items:center; gap:3mm;
    }
    .logo { width:22mm; height:auto; display:block; }
    .brand {
      flex:1; text-align:center;
      font-family:Georgia,'Times New Roman',serif;
      color:#ffffff;
      font-size:14px; line-height:1.35;
      letter-spacing:1px;
    }

    .produit-zone {
      position:absolute;
      top:22mm; left:6mm; right:6mm; height:14mm;
      display:flex; align-items:center; justify-content:center;
    }
    .produit-nom {
      width:100%;
      text-align:center;
      font-family:'Palatino Linotype',Palatino,'Book Antiqua',Georgia,serif;
      font-size:20px; letter-spacing:1px; line-height:1.15;
      text-transform:uppercase;
      color:#c4973a;
    }

    .pied {
      position:absolute;
      bottom:5mm; left:0; right:0;
      text-align:center;
      font-family:Georgia,'Times New Roman',serif;
      font-style:italic; color:#ffffff;
      font-size:8px; line-height:1.7;
      letter-spacing:0.4px;
    }

    @page { margin:0; size:76mm 51mm; }
    @media print {
      html, body { margin:0 !important; padding:0 !important; }
      .etiquette, .cadre {
        -webkit-print-color-adjust:exact !important;
        print-color-adjust:exact !important;
      }
    }
  </style>
</head>
