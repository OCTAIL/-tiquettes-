<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Étiquette – Confiseries des Monts du Vaucluse</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@300;400;700&display=swap');

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: #e8e4db;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Lato', sans-serif;
  }

  /* ── ÉTIQUETTE : 8cm × 5cm à 96dpi
     8cm = 302.4px / 5cm = 189px
     On affiche ×2 pour lisibilité écran : 605×378px      */
  .etiquette {
    width: 605px;
    height: 378px;
    background: #1a2e5a;
    border: 4px solid #c8a951;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px 22px 10px;
    overflow: hidden;
  }

  /* Filets dorés */
  .filet {
    width: 100%; height: 1px; flex-shrink: 0;
    background: linear-gradient(to right, transparent, #c8a951 15%, #c8a951 85%, transparent);
  }
  .filet-sm {
    width: 50%; height: 1px; flex-shrink: 0;
    background: linear-gradient(to right, transparent, #c8a951 20%, #c8a951 80%, transparent);
  }

  /* Header */
  .header {
    display: flex; align-items: center; gap: 16px;
    width: 100%; margin: 8px 0 8px; flex-shrink: 0;
  }
  .logo-img { height: 92px; width: auto; object-fit: contain; flex-shrink: 0; }
  .brand { display: flex; flex-direction: column; }
  .brand-sup  { font-size: 15px; font-weight: 300; letter-spacing: 4px; color: #c8a951; text-transform: uppercase; }
  .brand-main { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; color: #fff; line-height: 1.2; }
  .brand-sub  { font-size: 13px; font-weight: 300; letter-spacing: 3px; color: #c8a951; text-transform: uppercase; margin-top: 3px; }

  /* Nom produit */
  .product-name {
    font-family: 'Playfair Display', serif;
    font-size: 21px; font-weight: 700;
    color: #c8a951; letter-spacing: 1.5px;
    text-transform: uppercase; text-align: center;
    line-height: 1.2; margin: 6px 0 5px; flex-shrink: 0;
  }

  /* Zone légale */
  .legal {
    width: 100%; flex: 1; overflow: hidden;
    display: flex; flex-direction: column; justify-content: center; gap: 2px;
  }
  .legal p { font-size: 12px; color: #ccc9bf; line-height: 1.55; }
  .legal strong { color: #fff; font-weight: 700; }
  .alg { font-weight: 700; color: #ffe599; }

  /* Pied */
  .adresse {
    font-size: 10px; color: #ffffff; font-weight: 700;
    text-align: center; letter-spacing: 0.4px;
    margin-top: 4px; flex-shrink: 0;
  }

  /* ── IMPRESSION : dimensions réelles
     width: 80mm; height: 50mm = 8cm × 5cm ✓
     Police légale: 1.9mm → hauteur d'x Lato ≈ 1.0mm ≥ 0.9mm requis ✓  */
  @media print {
    body { background: white; min-height: unset; }
    .etiquette {
      width: 80mm; height: 50mm;
      border: 0.4mm solid #c8a951;
      padding: 1.4mm 2.5mm 1.2mm;
    }
    .logo-img     { height: 11.5mm; }
    .header       { gap: 2mm; margin: 1mm 0 1mm; }
    .brand-sup    { font-size: 2mm; letter-spacing: 0.5mm; }
    .brand-main   { font-size: 3.5mm; }
    .brand-sub    { font-size: 1.7mm; letter-spacing: 0.4mm; margin-top: 0.4mm; }
    .product-name { font-size: 3mm; margin: 1mm 0 0.7mm; letter-spacing: 0.3mm; }
    .legal        { gap: 0.4mm; }
    .legal p      { font-size: 1.9mm; line-height: 1.5; }
    .adresse      { font-size: 1.3mm; margin-top: 0.5mm; }
    .filet, .filet-sm { height: 0.15mm; }
  }
</style>
</head>
