<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Étiquette Recto</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#1a1a1a; display:flex; align-items:center; justify-content:center; }
    .etiquette { position:relative; width:302px; height:189px; overflow:hidden; }
    .bg { position:absolute; top:0; left:0; }
    .bg svg { width:302px; height:189px; display:block; }
    .overlay { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }

    .produit-nom {
      position: absolute;
      top: 102px;
      left: 32px;
      width: 244px;
      height: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif;
      font-size: 20px;
      font-weight: normal;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #c4973a;
      white-space: nowrap;
    }

    /* Impression : l'étiquette remplit toute la page, sans marge.
       La taille de page (@page) est définie dynamiquement par le script
       à partir des paramètres ?w= et ?h= (en mm) de l'URL. */
 @media print {
  html, body {
    margin:0; padding:0;
    background:#ffffff !important;
    display:block !important;
    -webkit-print-color-adjust:exact;
    print-color-adjust:exact;
  }
  .etiquette {
    position:relative !important;
    top:auto !important;
    left:auto !important;
    overflow:hidden;
    -webkit-print-color-adjust:exact;
    print-color-adjust:exact;
  }
  .bg, .bg svg, .overlay {
    width:100% !important; height:100% !important;
    -webkit-print-color-adjust:exact;
    print-color-adjust:exact;
  }
  .produit-nom {
    top: 53.97% !important;
    left: 10.6% !important;
    width: 80.8% !important;
    height: 7.4% !important;
  }
}
  </style>
