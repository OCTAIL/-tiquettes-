<script>
  (function () {
    var params = new URLSearchParams(window.location.search);
    var nom = params.get('nom');
    if (nom) {
      nom = decodeURIComponent(nom.replace(/\+/g, ' '));
      document.getElementById('produitNom').textContent = nom;
      document.title = nom;
    }

    // Taille d'impression pilotée par l'URL : ?w=80&h=50 (millimètres).
    // Valeurs par défaut si non fournies : 80 x 50 mm.
    var w = parseFloat(params.get('w')) || 80;
    var h = parseFloat(params.get('h')) || 50;

    // @page size défini dynamiquement pour que Chrome génère un PDF
    // exactement aux dimensions de l'étiquette (80x50mm par défaut).
    // Cela garantit un rendu 1:1 dans ColorWorks Print sur Android
    // (pas de décalage, pas d'étiquettes gaspillées).
    var fontMM = (h * 0.1058).toFixed(2);
    var letterMM = (h * 0.00529).toFixed(3);
    document.getElementById('pageSize').textContent =
      '@page { margin: 0; size: ' + w + 'mm ' + h + 'mm; }' +
      '@media print {' +
        '.etiquette { width: ' + w + 'mm !important; height: ' + h + 'mm !important; }' +
        '.produit-nom { font-size: ' + fontMM + 'mm !important; letter-spacing: ' + letterMM + 'mm !important; }' +
      '}';
  })();
</script>
